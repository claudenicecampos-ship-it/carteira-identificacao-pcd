<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administração - GO Card PCD</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/carteira.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </div>
                    <span class="logo-text">GO Card <span class="highlight">PCD</span></span>
                </div>
                <nav class="nav-links">
                    <a href="../pages/central-direitos.html" class="nav-link">Central de Direitos</a>
                    <a href="../pages/comunidade.html" class="nav-link">Comunidade</a>
                    <button class="btn btn-secondary" id="logoutAdmin">Sair</button>
                </nav>
            </div>
        </header>

        <main class="main-content">
            <div class="container-wide">
                <div class="page-header">
                    <h1>Painel do Administrador</h1>
                    <p>Aqui você pode revisar denúncias e marcar casos como resolvidos.</p>
                </div>

                <section class="section">
                    <div id="adminLoading" class="info-box">Carregando denúncias...</div>
                    <div id="adminEmpty" class="info-box hidden">Nenhuma denúncia cadastrada até o momento.</div>
                    <div id="adminList" class="admin-list"></div>
                </section>
            </div>
        </main>
    </div>

    <div id="toast" class="toast"></div>

    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/admin.js"></script>
</body>
</html>
