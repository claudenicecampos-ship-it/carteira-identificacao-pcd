<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GO Card PCD</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/carteira.css">
    <link rel="stylesheet" href="../assets/css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </div>
                    <span class="logo-text">GO Card <span class="highlight">PCD</span></span>
                </div>
                <nav class="nav-links">
                    <a href="cadastro_carteira.html" class="nav-link">Cadastro</a>
                    <a href="central-direitos.html" class="nav-link">Central de Direitos</a>
                    <a href="comunidade.html" class="nav-link">Comunidade</a>
                </nav>
            </div>
        </header>

        <main class="main-content">
            <div class="container">
                <div class="auth-form-wrapper">
                    <div class="form-container">
                        <div class="form-header">
                            <h1>Entrar</h1>
                            <p>Acesse sua conta GO Card PCD</p>
                        </div>

                        <form id="loginForm" class="auth-form">
                            <div class="form-group">
                                <label for="email">Email</label>
                                <input 
                                    type="email" 
                                    id="email" 
                                    name="email" 
                                    placeholder="seu@email.com"
                                    required
                                    class="input-field"
                                >
                                <span class="error-message" id="emailError"></span>
                            </div>

                            <div class="form-group">
                                <label for="senha">Senha</label>
                                <div class="password-wrapper">
                                    <input 
                                        type="password" 
                                        id="senha" 
                                        name="senha" 
                                        placeholder="Sua senha"
                                        required
                                        class="input-field"
                                    >
                                    <button type="button" class="toggle-password" onclick="togglePassword('senha')">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                            <circle cx="12" cy="12" r="3"></circle>
                                        </svg>
                                    </button>
                                </div>
                                <span class="error-message" id="senhaError"></span>
                            </div>

                            <div class="form-options">
                                <label class="checkbox-wrapper">
                                    <input type="checkbox" id="lembrarMe" name="lembrarMe">
                                    <span>Lembrar-me</span>
                                </label>
                                <a href="recuperar-senha.html" class="link">Esqueceu a senha?</a>
                            </div>

                            <button type="submit" class="btn btn-primary full-width" id="loginBtn">
                                <span>Entrar</span>
                                <span class="spinner" id="spinner"></span>
                            </button>
                        </form>

                        <div class="divider">
                            <span>Novo por aqui?</span>
                        </div>

                        <a href="cadastro.html" class="btn btn-secondary full-width">Criar uma conta</a>

                        <div class="security-info">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                            Conexao segura e criptografada
                        </div>
                    </div>

                    <div class="form-footer">
                        <small>&copy; 2025 GO Card PCD. Todos os direitos reservados.</small>
                    </div>
                </div>
            </div>
        </main>

        <footer class="main-footer">
            <p>&copy; 2025 GO Card PCD - Garantindo Dignidade e Direitos | Lei 13.146/2015</p>
        </footer>
    </div>

    <!-- Toast para mensagens -->
    <div id="toast" class="toast"></div>

    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/login.js"></script>
</body>
</html>
